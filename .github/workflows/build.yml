name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: WavLoom-Express-Windows
          - os: ubuntu-latest
            platform: linux
            artifact: WavLoom-Express-Linux
          - os: macos-latest
            platform: mac
            artifact: WavLoom-Express-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build Electron (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.exe.blockmap
          retention-days: 30

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.AppImage
            release/*.tar.gz
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Windows
        run: |
          cd artifacts/WavLoom-Express-Windows
          zip -j ../../WavLoom-Express-Windows-Setup.zip *.exe

      - name: Zip Linux
        run: |
          cd artifacts/WavLoom-Express-Linux
          zip -j ../../WavLoom-Express-Linux.zip *.AppImage *.tar.gz

      - name: Zip macOS
        run: |
          cd artifacts/WavLoom-Express-macOS
          zip -j ../../WavLoom-Express-macOS.zip *.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WavLoom-Express-Windows-Setup.zip
            WavLoom-Express-Linux.zip
            WavLoom-Express-macOS.zip
          generate_release_notes: true
